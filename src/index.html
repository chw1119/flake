<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memo App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">📝 Memo</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn minimize" id="btn-minimize" title="최소화">─</button>
      <button class="titlebar-btn maximize" id="btn-maximize" title="최대화">□</button>
      <button class="titlebar-btn close" id="btn-close" title="닫기">✕</button>
    </div>
  </div>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>메모 목록</h2>
        <button class="btn-icon" id="btn-new-memo" title="새 메모 (Ctrl+N)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="메모 검색..." />
      </div>
      <div class="memo-list" id="memo-list">
        <!-- memo items rendered here -->
      </div>
      <div class="sidebar-footer">
        <button class="btn-secondary" id="btn-load" title="파일에서 불러오기">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          불러오기
        </button>
        <button class="btn-secondary" id="btn-save-file" title="파일로 저장">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          저장
        </button>
      </div>
    </aside>

    <!-- Main Editor -->
    <main class="editor-area">
      <div class="editor-header">
        <input type="text" id="memo-title" class="memo-title-input" placeholder="제목을 입력하세요..." />
        <div class="editor-toolbar">
          <button class="toolbar-btn" data-command="bold" title="굵게 (Ctrl+B)"><b>B</b></button>
          <button class="toolbar-btn" data-command="italic" title="기울임 (Ctrl+I)"><i>I</i></button>
          <button class="toolbar-btn" data-command="underline" title="밑줄 (Ctrl+U)"><u>U</u></button>
          <button class="toolbar-btn" data-command="strikeThrough" title="취소선"><s>S</s></button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" data-command="insertUnorderedList" title="목록">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
          </button>
          <button class="toolbar-btn" data-command="insertOrderedList" title="번호 목록">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="10" y1="6" x2="21" y2="6"></line>
              <line x1="10" y1="12" x2="21" y2="12"></line>
              <line x1="10" y1="18" x2="21" y2="18"></line>
              <text x="3" y="7" font-size="8" fill="currentColor" stroke="none">1</text>
              <text x="3" y="13" font-size="8" fill="currentColor" stroke="none">2</text>
              <text x="3" y="19" font-size="8" fill="currentColor" stroke="none">3</text>
            </svg>
          </button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" id="btn-add-image" title="이미지 추가">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
          </button>
          <select id="font-size-select" class="toolbar-select" title="글자 크기">
            <option value="1">작게</option>
            <option value="3" selected>보통</option>
            <option value="5">크게</option>
            <option value="7">매우 크게</option>
          </select>
        </div>
      </div>

      <div class="editor-content" id="editor" contenteditable="true" placeholder="여기에 메모를 작성하세요... (이미지를 붙여넣을 수 있습니다)">
      </div>

      <div class="editor-status">
        <span id="status-text">준비</span>
        <span id="char-count">0자</span>
      </div>
    </main>
  </div>

  <!-- Toast notification -->
  <div class="toast-container" id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
