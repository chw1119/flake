<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flake</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">❄️ Flake</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn minimize" id="btn-minimize" title="최소화">─</button>
      <button class="titlebar-btn maximize" id="btn-maximize" title="최대화">□</button>
      <button class="titlebar-btn close" id="btn-close" title="닫기">✕</button>
    </div>
  </div>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>메모 목록</h2>
        <button class="btn-icon" id="btn-new-memo" title="새 메모 (Ctrl+N)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="메모 검색..." />
      </div>
      <div class="memo-list" id="memo-list">
        <!-- memo items rendered here -->
      </div>
      <div class="sidebar-footer">
        <span class="auto-save-label">자동 저장됨 — ~/.flake</span>
      </div>
    </aside>

    <!-- Main Editor -->
    <main class="editor-area">
      <div class="editor-header">
        <input type="text" id="memo-title" class="memo-title-input" placeholder="제목을 입력하세요..." />
        <div class="editor-toolbar">
          <button class="toolbar-btn" data-command="bold" title="굵게 (Ctrl+B)"><b>B</b></button>
          <button class="toolbar-btn" data-command="italic" title="기울임 (Ctrl+I)"><i>I</i></button>
          <button class="toolbar-btn" data-command="underline" title="밑줄 (Ctrl+U)"><u>U</u></button>
          <button class="toolbar-btn" data-command="strikeThrough" title="취소선"><s>S</s></button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" data-command="insertUnorderedList" title="목록">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
          </button>
          <button class="toolbar-btn" data-command="insertOrderedList" title="번호 목록">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="10" y1="6" x2="21" y2="6"></line>
              <line x1="10" y1="12" x2="21" y2="12"></line>
              <line x1="10" y1="18" x2="21" y2="18"></line>
              <text x="3" y="7" font-size="8" fill="currentColor" stroke="none">1</text>
              <text x="3" y="13" font-size="8" fill="currentColor" stroke="none">2</text>
              <text x="3" y="19" font-size="8" fill="currentColor" stroke="none">3</text>
            </svg>
          </button>
          <div class="toolbar-divider"></div>
          <button class="toolbar-btn" id="btn-add-image" title="이미지 추가">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
          </button>
          <button class="toolbar-btn" id="btn-add-codeblock" title="코드 블록 추가 (Ctrl+Shift+K)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 18 22 12 16 6"></polyline>
              <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
          </button>
          <div class="toolbar-divider"></div>
          <select id="font-family-select" class="toolbar-select" title="서체">
            <option value="Segoe UI, sans-serif">Segoe UI</option>
            <option value="Arial, sans-serif">Arial</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Times New Roman, serif">Times New Roman</option>
            <option value="Courier New, monospace">Courier New</option>
            <option value="Verdana, sans-serif">Verdana</option>
            <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
            <option value="Noto Sans KR, sans-serif">Noto Sans KR</option>
          </select>
          <select id="font-size-select" class="toolbar-select" title="글자 크기">
            <option value="10">10px</option>
            <option value="12">12px</option>
            <option value="14">14px</option>
            <option value="16" selected>16px</option>
            <option value="18">18px</option>
            <option value="20">20px</option>
            <option value="24">24px</option>
            <option value="28">28px</option>
            <option value="32">32px</option>
            <option value="36">36px</option>
            <option value="48">48px</option>
            <option value="64">64px</option>
          </select>
        </div>
      </div>

      <!-- Find & Replace Bar -->
      <div class="find-bar" id="find-bar" style="display:none">
        <div class="find-row">
          <input type="text" id="find-input" placeholder="찾기..." />
          <span class="find-count" id="find-count">0/0</span>
          <button class="find-btn" id="btn-find-prev" title="이전 (Shift+Enter)">▲</button>
          <button class="find-btn" id="btn-find-next" title="다음 (Enter)">▼</button>
          <button class="find-btn" id="btn-find-toggle-replace" title="바꾸기 열기">⇄</button>
          <button class="find-btn" id="btn-find-close" title="닫기 (Esc)">✕</button>
        </div>
        <div class="replace-row" id="replace-row" style="display:none">
          <input type="text" id="replace-input" placeholder="바꾸기..." />
          <button class="find-btn" id="btn-replace-one" title="바꾸기">바꾸기</button>
          <button class="find-btn" id="btn-replace-all" title="모두 바꾸기">모두</button>
        </div>
      </div>

      <div class="editor-content" id="editor" contenteditable="true" placeholder="여기에 메모를 작성하세요... (이미지를 붙여넣을 수 있습니다)">
      </div>

      <div class="editor-status">
        <span id="status-text">준비</span>
        <span id="char-count">0자</span>
      </div>

      <!-- AI Toggle Button -->
      <button class="ai-toggle-btn" id="btn-toggle-ai" title="Claude AI (Ctrl+Shift+A)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"></path>
          <path d="M6 10v2a6 6 0 0 0 12 0v-2"></path>
          <line x1="12" y1="18" x2="12" y2="22"></line>
          <line x1="8" y1="22" x2="16" y2="22"></line>
        </svg>
      </button>
    </main>

    <!-- AI Chat Panel -->
    <aside class="ai-panel" id="ai-panel">
      <div class="ai-panel-header">
        <div class="ai-panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a4 4 0 0 1 4 4v1a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"></path>
            <path d="M6 10v2a6 6 0 0 0 12 0v-2"></path>
            <line x1="12" y1="18" x2="12" y2="22"></line>
            <line x1="8" y1="22" x2="16" y2="22"></line>
          </svg>
          <span>Claude AI</span>
          <span class="ai-status-badge" id="ai-status-badge">확인 중...</span>
        </div>
        <button class="btn-icon-sm" id="btn-close-ai" title="닫기">✕</button>
      </div>

      <div class="ai-messages" id="ai-messages">
        <div class="ai-message system">
          <p>안녕하세요! 메모 작성을 도와드릴게요.</p>
          <p class="ai-hint">예: "이 메모를 요약해줘", "영어로 번역해줘", "더 자세하게 작성해줘"</p>
        </div>
      </div>

      <div class="ai-input-area">
        <div class="ai-input-row">
          <textarea id="ai-input" placeholder="Claude에게 물어보세요..." rows="1"></textarea>
          <button class="ai-send-btn" id="btn-ai-send" title="전송 (Enter)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="ai-actions">
          <button class="ai-action-btn" id="btn-ai-apply" title="AI 응답을 메모에 추가" disabled>
            메모에 적용
          </button>
          <button class="ai-action-btn" id="btn-ai-replace" title="AI 응답으로 메모 교체" disabled>
            메모 교체
          </button>
          <button class="ai-action-btn danger" id="btn-ai-stop" title="생성 중단" style="display:none">
            중단
          </button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Toast notification -->
  <div class="toast-container" id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
